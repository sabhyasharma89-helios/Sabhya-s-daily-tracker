name: Process Emails & Update Tasks

on:
  schedule:
    # Runs every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      description:
        description: "Manual trigger reason (optional)"
        required: false
        default: "Manual run"

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use PAT so the push can trigger GitHub Pages rebuild if needed
          token: ${{ secrets.GITHUB_TOKEN }}
          # Always fetch the latest to avoid stale data
          ref: ${{ github.ref_name }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "scripts/requirements.txt"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Process emails with Claude AI
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/process_emails.py

      - name: Commit updated tasks.json
        run: |
          git config --local user.email "tasktracker-bot@github-actions"
          git config --local user.name "Task Tracker Bot"
          git add data/tasks.json
          if git diff --staged --quiet; then
            echo "No changes to tasks.json – nothing to commit."
          else
            git commit -m "chore: update tasks [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi

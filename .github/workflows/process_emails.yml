name: Process Emails & Sync Tasks

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch:
    inputs:
      full_rescan:
        description: "Re-scan last 30 days (ignores last-check timestamp)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Full-rescan reset (manual trigger only)
        if: ${{ github.event.inputs.full_rescan == 'true' }}
        run: |
          python - <<'EOF'
          import json
          with open("data/tasks.json") as f:
              db = json.load(f)
          db["lastEmailCheck"] = None
          with open("data/tasks.json", "w") as f:
              json.dump(db, f, indent=2)
          print("lastEmailCheck reset — full 30-day rescan will run.")
          EOF

      - name: Process emails and update tasks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
        run: python scripts/email_processor.py

      - name: Commit and push task updates
        run: |
          git config user.name  "Task Tracker Bot"
          git config user.email "bot@task-tracker.local"
          git add data/tasks.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: sync tasks from emails [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

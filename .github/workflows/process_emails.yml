name: Process Emails

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      force_first_run:
        description: 'Reset to first run (re-process last 30 days)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Reset to first run (if requested)
        if: ${{ inputs.force_first_run == 'true' }}
        run: |
          python3 -c "
          import json
          with open('data/metadata.json', 'r') as f:
              meta = json.load(f)
          meta['isFirstRun'] = True
          with open('data/metadata.json', 'w') as f:
              json.dump(meta, f, indent=2)
          print('Reset metadata to first run')
          "

      - name: Process emails
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: python3 scripts/process_emails.py

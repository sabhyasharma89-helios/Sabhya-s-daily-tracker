name: Email Sync

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: 'Force full 30-day sync (ignores last checkpoint)'
        required: false
        type: boolean
        default: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Process emails
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_FULL_SYNC: ${{ inputs.force_full_sync || 'false' }}
        run: python scripts/email_processor.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "GitHub Actions Bot"
          git add data/tasks.json
          if git diff --staged --quiet; then
            echo "No changes — tasks database already up to date."
          else
            git commit -m "🔄 Auto-sync: tasks updated [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push origin ${{ github.ref_name }}
          fi

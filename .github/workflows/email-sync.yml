name: Email Sync - Task Tracker

on:
  schedule:
    # Runs every 10 minutes
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      force_full_sync:
        description: 'Force full 30-day sync (first run mode)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  sync-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            google-auth==2.29.0 \
            google-auth-oauthlib==1.2.0 \
            google-auth-httplib2==0.2.0 \
            google-api-python-client==2.127.0 \
            anthropic==0.28.0 \
            python-dateutil==2.9.0 \
            pytz==2024.1

      - name: Run email sync
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FORCE_FULL_SYNC: ${{ github.event.inputs.force_full_sync || 'false' }}
        run: python scripts/process_emails.py

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "Task Tracker Bot"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit - no new emails processed"
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "sync: update task database [$TIMESTAMP]"
            git push origin HEAD
          fi

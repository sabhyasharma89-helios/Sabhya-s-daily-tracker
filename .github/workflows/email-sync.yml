name: Email Sync

# Runs every 10 minutes and can be triggered manually
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Fetch emails and update tasks
    runs-on: ubuntu-latest

    permissions:
      contents: write   # needed to commit database.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Use GH_PAT if provided (allows pushing back to the repo);
          # falls back to the built-in GITHUB_TOKEN.
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run email sync
        env:
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          GMAIL_TOKEN_JSON:       ${{ secrets.GMAIL_TOKEN_JSON }}
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/process_emails.py

      - name: Commit updated database
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"
          git add data/database.json
          if git diff --staged --quiet; then
            echo "No changes to database — nothing to commit."
          else
            COUNT=$(git diff --staged --stat data/database.json | tail -1)
            git commit -m "chore: email sync $(date -u '+%Y-%m-%d %H:%M UTC') [$COUNT]"
            git push
            echo "Database pushed successfully."
          fi

name: Process Emails

on:
  # Run every 10 minutes
  schedule:
    - cron: '*/10 * * * *'

  # Allow manual trigger from GitHub UI or via API (frontend Sync button)
  workflow_dispatch:

  # Also run on push to main (useful for testing)
  push:
    branches: [main]
    paths:
      - 'scripts/process_emails.py'
      - 'scripts/requirements.txt'

permissions:
  contents: write   # allow committing data/ files back

jobs:
  process-emails:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Process emails
        env:
          GMAIL_TOKEN:       ${{ secrets.GMAIL_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/process_emails.py

      - name: Commit updated data
        run: |
          git config user.name  "Sabhya Tracker Bot"
          git config user.email "tracker-bot@users.noreply.github.com"
          git add data/tasks.json data/config.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update tasks from emails [$(date -u +'%Y-%m-%d %H:%M UTC')]"
            git push
          fi

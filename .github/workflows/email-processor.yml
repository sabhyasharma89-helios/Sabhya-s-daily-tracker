name: Email Task Processor

on:
  # Run every 10 minutes
  schedule:
    - cron: '*/10 * * * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      first_run:
        description: 'First run (process last 30 days)?'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

# Prevent parallel runs
concurrency:
  group: email-processor
  cancel-in-progress: false

jobs:
  process-emails:
    name: Process Gmail → Tasks
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Python setup ───────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      # ── 4. Run processor ──────────────────────────────────────
      - name: Process emails
        env:
          GMAIL_TOKEN_JSON:        ${{ secrets.GMAIL_TOKEN_JSON }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          # Set FIRST_RUN=true on first deployment, then remove the secret
          FIRST_RUN: ${{ github.event.inputs.first_run || secrets.FIRST_RUN || 'false' }}
        run: python scripts/process_emails.py

      # ── 5. Post summary ───────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "## Email Processor Run" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

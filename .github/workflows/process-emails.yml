name: Process Emails

on:
  # Run every 10 minutes
  schedule:
    - cron: '*/10 * * * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      initial:
        description: 'Initial run — read last 30 days of emails'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  process:
    name: Fetch & Analyse Emails
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit data/tasks.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Process emails
        env:
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          GMAIL_CLIENT_ID:     ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.initial }}" = "true" ]; then
            echo "▶ Running initial email processing (last 30 days)…"
            python scripts/process_emails.py --initial
          else
            echo "▶ Running incremental email processing…"
            python scripts/process_emails.py
          fi

      - name: Commit updated task database
        run: |
          git config --local user.name  "Task Tracker Bot"
          git config --local user.email "bot@daily-tracker"
          git add data/tasks.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update tasks from emails [$(date -u '+%Y-%m-%dT%H:%M:%SZ')]"
            git push origin ${{ github.ref_name }}
            echo "✅ Database committed and pushed."
          fi

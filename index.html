<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Sabhya's Daily Task Tracker</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
</head>
<body>

<!-- ═══════════════════════════════════════════════════ PATTERN LOCK ══ -->
<div id="pattern-overlay">
  <div class="pattern-box">
    <div class="pattern-logo">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <path d="M9 12h6M9 16h4"/>
      </svg>
      <span>Daily Tracker</span>
    </div>
    <p id="pattern-message" class="pattern-hint">Draw your pattern to unlock</p>
    <div class="canvas-wrap">
      <canvas id="pattern-canvas" width="260" height="260"></canvas>
    </div>
    <button id="pattern-reset" class="btn-link" style="display:none">Reset pattern</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════ APP ══ -->
<div id="app" style="display:none">

  <!-- Loading bar -->
  <div id="loading-bar" style="display:none"></div>

  <!-- ─── Header ────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-left">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
        <rect x="9" y="3" width="6" height="4" rx="1"/>
        <path d="M9 12h6M9 16h4"/>
      </svg>
      <h1 class="app-title">Sabhya's Tracker</h1>
    </div>
    <div class="header-right">
      <span id="last-email-sync" class="meta-text"></span>
      <span id="sync-time" class="meta-text"></span>
      <span id="sync-badge" class="sync-badge local">● Local</span>
      <button id="refresh-btn" class="icon-btn" title="Refresh data">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
        </svg>
      </button>
      <button id="add-task-btn" class="btn-primary small">+ Task</button>
      <button id="settings-btn" class="icon-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ─── Stats ──────────────────────────────────────────────────────── -->
  <div class="stats-bar">
    <div class="stat-card">
      <span class="stat-num" id="stat-total">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat-card pending">
      <span class="stat-num" id="stat-pending">0</span>
      <span class="stat-label">Pending</span>
    </div>
    <div class="stat-card completed">
      <span class="stat-num" id="stat-completed">0</span>
      <span class="stat-label">Done</span>
    </div>
    <div class="stat-card urgent">
      <span class="stat-num" id="stat-urgent">0</span>
      <span class="stat-label">Urgent</span>
    </div>
    <div class="stat-card medium">
      <span class="stat-num" id="stat-medium">0</span>
      <span class="stat-label">Medium</span>
    </div>
    <div class="stat-card low">
      <span class="stat-num" id="stat-low">0</span>
      <span class="stat-label">Low</span>
    </div>
  </div>

  <!-- ─── Controls ──────────────────────────────────────────────────── -->
  <div class="controls-bar">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search tasks, clients, assignees…" class="search-input">
    </div>
    <div class="filters">
      <select id="filter-priority" class="filter-sel">
        <option value="all">All priorities</option>
        <option value="urgent">🔴 Urgent</option>
        <option value="medium">🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>
      <select id="filter-assignee" class="filter-sel">
        <option value="all">All assignees</option>
      </select>
    </div>
  </div>

  <!-- ─── Client tabs ────────────────────────────────────────────────── -->
  <div class="tabs-wrapper">
    <div id="client-tabs" class="client-tabs"></div>
    <div class="view-toggle">
      <label class="toggle-label">
        <input type="checkbox" id="view-completed">
        <span class="toggle-slider"></span>
        <span>Completed</span>
      </label>
    </div>
  </div>

  <!-- ─── Task list ──────────────────────────────────────────────────── -->
  <main class="main-content">
    <div id="task-list" class="task-list"></div>
  </main>

</div><!-- /#app -->

<!-- ═══════════════════════════════════════════════ TASK DETAIL MODAL ══ -->
<div id="task-modal" class="modal-overlay" style="display:none">
  <div class="modal modal-large">
    <div id="task-modal-content"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ ADD TASK MODAL ══ -->
<div id="add-task-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2>Add Task</h2>
      <button class="modal-close" onclick="App.closeModal()">×</button>
    </div>
    <div class="modal-body">
      <form id="add-task-form"></form>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════ SETTINGS MODAL ══ -->
<div id="settings-modal" class="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="modal-close" onclick="App.closeModal()">×</button>
    </div>
    <div class="modal-body">
      <form id="settings-form">
        <p class="settings-note">Connect to GitHub to sync changes across devices. Create a Personal Access Token with <code>repo</code> scope.</p>
        <div class="form-row">
          <label>GitHub PAT (Personal Access Token)</label>
          <input type="password" id="settings-pat" placeholder="ghp_xxxxxxxxxxxx">
        </div>
        <div class="form-row">
          <label>GitHub Repository <small>(owner/repo)</small></label>
          <input type="text" id="settings-repo" placeholder="sabhyasharma89-helios/sabhya-s-daily-tracker">
        </div>
        <div class="form-row">
          <label>Branch</label>
          <input type="text" id="settings-branch" placeholder="main" value="main">
        </div>

        <div class="settings-divider">Team Members</div>
        <div id="employee-list" class="employee-list"></div>
        <button type="button" id="add-employee-btn" class="btn-secondary small">+ Add Member</button>

        <div class="settings-divider">Pattern Lock</div>
        <button type="button" class="btn-secondary" onclick="App.closeModal(); PatternAuth.resetPattern(); document.getElementById('pattern-overlay').style.display='flex'; document.getElementById('app').style.display='none';">
          Reset Pattern
        </button>

        <div class="form-actions" style="margin-top:1.5rem">
          <button type="button" class="btn-secondary" onclick="App.closeModal()">Cancel</button>
          <button type="submit" class="btn-primary">Save Settings</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/github-api.js"></script>
<script src="js/app.js"></script>
</body>
</html>

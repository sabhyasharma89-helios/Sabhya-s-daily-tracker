<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="FitCoach" />
<title>FitCoach</title>

<link rel="manifest" href="./manifest.json" />
<link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
<link rel="apple-touch-icon" href="./icons/apple-touch-icon-180.png" />
<link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon-180.png" />
<link rel="apple-touch-icon" sizes="167x167" href="./icons/apple-touch-icon-167.png" />
<link rel="apple-touch-icon" sizes="152x152" href="./icons/apple-touch-icon-152.png" />
<link rel="apple-touch-icon" sizes="120x120" href="./icons/apple-touch-icon-120.png" />

<link rel="stylesheet" href="./css/styles.css" />
</head>
<body>

<div id="app">
  <header id="topbar">
    <div id="topbar-title">FitCoach</div>
    <div id="topbar-sub"></div>
  </header>

  <main id="view"></main>

  <nav id="tabbar">
    <button class="tab active" data-tab="today" aria-label="Today">
      <span class="tab-ico">●</span>
      <span class="tab-label">Today</span>
    </button>
    <button class="tab" data-tab="log" aria-label="Log">
      <span class="tab-ico">＋</span>
      <span class="tab-label">Log</span>
    </button>
    <button class="tab" data-tab="coach" aria-label="Coach">
      <span class="tab-ico">✦</span>
      <span class="tab-label">Coach</span>
    </button>
    <button class="tab" data-tab="trends" aria-label="Trends">
      <span class="tab-ico">▲</span>
      <span class="tab-label">Trends</span>
    </button>
    <button class="tab" data-tab="settings" aria-label="Settings">
      <span class="tab-ico">⚙</span>
      <span class="tab-label">Settings</span>
    </button>
  </nav>

  <div id="modal-root"></div>
  <div id="toast-root"></div>
</div>

<script type="importmap">
{
  "imports": {
    "idb": "https://cdn.jsdelivr.net/npm/idb@8/+esm",
    "date-fns": "https://cdn.jsdelivr.net/npm/date-fns@3/+esm",
    "chart.js": "https://cdn.jsdelivr.net/npm/chart.js@4.4.4/+esm"
  }
}
</script>
<script type="module" src="./js/app.js"></script>

</body>
</html>
